  defaultConfig,
  onConfigChange: async (config) => {

    const el = document.getElementById('app-title');
    if (el) el.textContent = title;
    document.documentElement.style.setProperty('--primary', config.primary_color || defaultConfig.primary_color);
    document.documentElement.style.setProperty('--secondary', config.secondary_color || defaultConfig.secondary_color);
  },
  mapToCapabilities: (config) => ({
    recolorables: [

      { get:()=>config.surface_color||defaultConfig.surface_color, set:(v)=>{config.surface_color=v;window.elementSdk.setConfig({surface_color:v})} },
      { get:()=>config.text_color||defaultConfig.text_color, set:(v)=>{config.text_color=v;window.elementSdk.setConfig({text_color:v})} },

    ["app_title", config.app_title || defaultConfig.app_title],
    ["welcome_message", config.welcome_message || defaultConfig.welcome_message]

});

// ===== DATA SDK =====
const dataHandler = {
  onDataChanged(data) {
    userData = data;
    updateUI();
  }
};

(async()=>{
  const r = await window.dataSdk.init(dataHandler);
  if(!r.isOk) console.error("Data SDK init failed");
})();

// ===== HELPERS =====
function getProgress(lessonId) {
  return userData.filter(d=>d.type==='lesson_complete'&&d.lesson_id===lessonId);
}
function getVocabProgress(lessonId) {
  return userData.filter(d=>d.type==='vocab_learned'&&d.lesson_id===lessonId);
}
function getTotalXP() {
  const xpRecords = userData.filter(d=>d.type==='xp');
  return xpRecords.reduce((s,r)=>s+(r.xp||0),0);
}
function getStreak() {
  const streakR = userData.filter(d=>d.type==='streak').sort((a,b)=>(b.last_study||'').localeCompare(a.last_study||''));
  return streakR.length>0 ? (streakR[0].streak||0) : 0;
}
function getLessonsCompleted() {
  return [...new Set(userData.filter(d=>d.type==='lesson_complete').map(d=>d.lesson_id))];
}
function getQuizScores() {
  return userData.filter(d=>d.type==='quiz_score');
}

async function addXP(amount) {
  if(userData.length>=999) return;
  await window.dataSdk.create({type:'xp',xp:amount,lesson_id:currentLesson?.id||0,last_study:new Date().toISOString(),completed:false,vocab_id:'',score:0,streak:0,review_due:'',correct_count:0,incorrect_count:0});
}
async function markLessonComplete(lessonId) {
  if(userData.length>=999) return;
  const existing = userData.find(d=>d.type==='lesson_complete'&&d.lesson_id===lessonId);
  if(!existing) {
    await window.dataSdk.create({type:'lesson_complete',lesson_id:lessonId,completed:true,last_study:new Date().toISOString(),xp:0,vocab_id:'',score:0,streak:0,review_due:'',correct_count:0,incorrect_count:0});
  }
}
async function markVocabLearned(lessonId, vocabId) {
  if(userData.length>=999) return;
  const existing = userData.find(d=>d.type==='vocab_learned'&&d.lesson_id===lessonId&&d.vocab_id===vocabId);
  if(!existing) {
    await window.dataSdk.create({type:'vocab_learned',lesson_id:lessonId,vocab_id:vocabId,completed:true,last_study:new Date().toISOString(),xp:0,score:0,streak:0,review_due:'',correct_count:0,incorrect_count:0});
  }
}
async function saveQuizScore(lessonId, score) {
  if(userData.length>=999) return;
  await window.dataSdk.create({type:'quiz_score',lesson_id:lessonId,score:score,completed:true,last_study:new Date().toISOString(),xp:0,vocab_id:'',streak:0,review_due:'',correct_count:0,incorrect_count:0});
}
async function updateStreak() {
  if(userData.length>=999) return;
  const today = new Date().toISOString().split('T')[0];
  const streakRecords = userData.filter(d=>d.type==='streak').sort((a,b)=>(b.last_study||'').localeCompare(a.last_study||''));
  if(streakRecords.length>0) {
    const last = streakRecords[0];
    const lastDate = (last.last_study||'').split('T')[0];
    if(lastDate===today) return;
    const yesterday = new Date(Date.now()-86400000).toISOString().split('T')[0];
    const newStreak = lastDate===yesterday ? (last.streak||0)+1 : 1;
    await window.dataSdk.update({...last, streak:newStreak, last_study:new Date().toISOString()});
  } else {
    await window.dataSdk.create({type:'streak',streak:1,last_study:new Date().toISOString(),lesson_id:0,completed:false,xp:0,vocab_id:'',score:0,review_due:'',correct_count:0,incorrect_count:0});
  }
}

  if(currentPage==='home') renderHome();

}

function navigate() {
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.classList.toggle('tab-active', b.dataset.page===currentPage);
    b.classList.toggle('text-indigo-500', b.dataset.page===currentPage);
    b.classList.toggle('dark:text-indigo-400', b.dataset.page===currentPage);
    b.classList.toggle('text-slate-500', b.dataset.page!==currentPage);
  });
  const main = document.getElementById('main-content');
  switch(currentPage) {
    case 'home': renderHome(); break;
    case 'lessons': renderLessons(); break;
    case 'practice': renderPractice(); break;
    case 'review': renderReview(); break;
    case 'progress': renderProgress(); break;
    default: renderHome();
  }
}

function renderQuiz(container) {
  const l = currentLesson;
  const questions = l.vocab.sort(()=>Math.random()-0.5).slice(0,5).map(v=>{
    const wrong = l.vocab.filter(x=>x.kr!==v.kr).sort(()=>Math.random()-0.5).slice(0,3).map(x=>x.vi);
    const options = [...wrong, v.vi].sort(()=>Math.random()-0.5);
    return {word:v.kr, rom:v.rom, correct:v.vi, options};
  });
  quizState = {questions, current:0, score:0, answers:[]};
  renderQuizQuestion(container);
}

function renderQuizQuestion(container) {
  const q = quizState.questions[quizState.current];
  if(!q) { renderQuizResult(container); return; }
  container.innerHTML = `
  <div class="fade-in max-w-sm mx-auto">
    <div class="flex justify-between items-center mb-4">
      <span class="text-sm text-slate-500">Question ${quizState.current+1}/${quizState.questions.length}</span>
      <span class="text-sm font-medium text-indigo-500">Score: ${quizState.score}</span>
    </div>
    <div class="bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl p-6 text-center text-white mb-4">
      <p class="font-korean text-3xl font-bold">${q.word}</p>
      <p class="text-sm opacity-70 mt-1">${q.rom}</p>
    </div>
    <p class="text-sm text-slate-500 mb-3">Choose the correct meaning:</p>
    <div class="space-y-2">
      ${q.options.map((o,i)=>`
        <button onclick="answerQuiz(${i})" class="quiz-opt w-full text-left px-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl hover:border-indigo-400 transition text-sm font-medium">${o}</button>
      `).join('')}
    </div>
  </div>`;
}

window.answerQuiz = function(idx) {
  const q = quizState.questions[quizState.current];
  const selected = q.options[idx];
  const correct = selected === q.correct;
  if(correct) quizState.score++;
  quizState.answers.push({correct});
  
  // highlight
  document.querySelectorAll('.quiz-opt').forEach((btn,i)=>{
    btn.disabled = true;
    if(q.options[i]===q.correct) btn.classList.add('border-green-500','bg-green-50','dark:bg-green-900/30');
    else if(i===idx&&!correct) btn.classList.add('border-red-500','bg-red-50','dark:bg-red-900/30');
  });
  
  setTimeout(()=>{
    quizState.current++;
    renderQuizQuestion(document.getElementById('lesson-content'));
  }, 1000);
}

async function renderQuizResult(container) {
  const pct = Math.round(quizState.score/quizState.questions.length*100);
  await saveQuizScore(currentLesson.id, pct);
  await addXP(quizState.score*5);
  if(pct>=80) await markLessonComplete(currentLesson.id);
  container.innerHTML = `

    <div class="text-6xl mb-4">${pct>=80?'🎉':'📚'}</div>

        ${streak>=7?'<span class="bg-orange-100 dark:bg-orange-900/50 text-orange-700 dark:text-orange-300 text-xs px-3 py-1 rounded-full">🔥 Week Warrior</span>':''}
        ${completed===0&&totalVocab===0?'<span class="text-xs text-slate-400">Start learning to earn badges!</span>':''}
      </div>
    </div>
  </div>`;
}
