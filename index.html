    { word: "unprecedented", ipa: "/ʌnˈpresɪdentɪd/", pos: "adjective", vi: "chưa từng có", def: "never done or known before", example: "The pandemic caused unprecedented disruption.", synonyms: ["unparalleled", "extraordinary", "unique"], antonyms: ["common", "typical"], family: ["precedent", "precedented"], difficulty: 3, tags: ["academic", "ielts"] },
    { word: "versatile", ipa: "/ˈvɜːsətaɪl/", pos: "adjective", vi: "đa năng, linh hoạt", def: "able to adapt to many functions", example: "She's a versatile musician who plays five instruments.", synonyms: ["adaptable", "flexible", "multifaceted"], antonyms: ["limited", "inflexible"], family: ["versatility"], difficulty: 2, tags: ["daily", "academic"] },
    { word: "workforce", ipa: "/ˈwɜːkfɔːs/", pos: "noun", vi: "lực lượng lao động", def: "all people employed in a company or area", example: "The company has a diverse workforce.", synonyms: ["staff", "employees", "personnel"], antonyms: [], family: ["work", "worker"], difficulty: 1, tags: ["business", "daily"] },
    { word: "yield", ipa: "/jiːld/", pos: "verb/noun", vi: "mang lại, sản lượng", def: "to produce or generate a result", example: "The investment yielded high returns.", synonyms: ["produce", "generate", "provide"], antonyms: ["withhold", "consume"], family: ["yielding"], difficulty: 2, tags: ["business", "academic"] },
    { word: "comprehensive", ipa: "/ˌkɒmprɪˈhensɪv/", pos: "adjective", vi: "toàn diện", def: "including all elements or aspects", example: "We need a comprehensive review of the policy.", synonyms: ["thorough", "complete", "exhaustive"], antonyms: ["partial", "incomplete"], family: ["comprehensively", "comprehension"], difficulty: 2, tags: ["academic", "ielts"] },
    { word: "diligent", ipa: "/ˈdɪlɪdʒənt/", pos: "adjective", vi: "siêng năng, cần cù", def: "showing careful and persistent effort", example: "She is a diligent student.", synonyms: ["hardworking", "industrious", "assiduous"], antonyms: ["lazy", "negligent"], family: ["diligence", "diligently"], difficulty: 2, tags: ["academic", "daily"] },

    { word: "facilitate", ipa: "/fəˈsɪlɪteɪt/", pos: "verb", vi: "tạo điều kiện", def: "to make an action or process easier", example: "Technology facilitates remote communication.", synonyms: ["enable", "assist", "promote"], antonyms: ["hinder", "obstruct"], family: ["facilitation", "facilitator", "facility"], difficulty: 3, tags: ["academic", "business"] },
    { word: "innovate", ipa: "/ˈɪnəveɪt/", pos: "verb", vi: "đổi mới, sáng tạo", def: "to introduce new methods or ideas", example: "Companies must innovate to stay competitive.", synonyms: ["create", "pioneer", "revolutionize"], antonyms: ["copy", "stagnate"], family: ["innovation", "innovative", "innovator"], difficulty: 2, tags: ["technology", "business"] },
    { word: "profound", ipa: "/prəˈfaʊnd/", pos: "adjective", vi: "sâu sắc", def: "very great or intense; having deep meaning", example: "The book had a profound impact on me.", synonyms: ["deep", "intense", "significant"], antonyms: ["shallow", "superficial"], family: ["profoundly", "profundity"], difficulty: 3, tags: ["academic", "ielts"] },
];

// ===== STATE MANAGEMENT =====
let state = {
    currentView: 'dashboard',
    learned: [],
    reviews: [],
    streak: 0,
    lastStudyDate: null,
    dailyGoal: 10,
    todayLearned: 0,
    settings: { theme: 'light', dailyGoal: 10, fontSize: 16 },
    flashcardIndex: 0,
    gameScore: 0
};

function loadState() {
    try {
        const saved = localStorage.getItem('vocabmaster_state');
        if (saved) {
            const parsed = JSON.parse(saved);
            state = { ...state, ...parsed };
        }
        // Check streak
        const today = new Date().toDateString();
        if (state.lastStudyDate !== today) {
            const yesterday = new Date(Date.now() - 86400000).toDateString();
            if (state.lastStudyDate !== yesterday) state.streak = 0;
            state.todayLearned = 0;
        }
    } catch(e) {}
}

function saveState() {
    try { localStorage.setItem('vocabmaster_state', JSON.stringify(state)); } catch(e) {}
}

function recordStudy() {
    state.lastStudyDate = new Date().toDateString();
    state.todayLearned++;
    if (state.todayLearned === 1) state.streak++;
    saveState();
}

// ===== SRS =====
function getWordProgress(word) {
    const key = `srs_${word}`;
    const saved = localStorage.getItem(key);
    if (saved) return JSON.parse(saved);
    return { interval: 0, ease: 2.5, repetitions: 0, nextReview: 0, stage: 'new' };
}

function updateSRS(word, quality) { // quality: 0=again, 1=hard, 2=good, 3=easy
    const p = getWordProgress(word);
    if (quality < 2) { p.repetitions = 0; p.interval = 1; }
    else {
        if (p.repetitions === 0) p.interval = 1;
        else if (p.repetitions === 1) p.interval = 6;
        else p.interval = Math.round(p.interval * p.ease);
        p.repetitions++;
    }
    p.ease = Math.max(1.3, p.ease + (0.1 - (3 - quality) * (0.08 + (3 - quality) * 0.02)));
    p.nextReview = Date.now() + p.interval * 86400000;
    p.stage = p.repetitions >= 5 ? 'mastered' : p.repetitions >= 1 ? 'learning' : 'new';
    localStorage.setItem(`srs_${word}`, JSON.stringify(p));
}

function getDueWords() {
    return VOCAB.filter(v => {
        const p = getWordProgress(v.word);
        return p.nextReview <= Date.now() && p.stage !== 'new';
    });
}

function getNewWords() {
    return VOCAB.filter(v => getWordProgress(v.word).stage === 'new');
}

function getMasteredCount() {
    return VOCAB.filter(v => getWordProgress(v.word).stage === 'mastered').length;
}

function getLearningCount() {
    return VOCAB.filter(v => getWordProgress(v.word).stage !== 'new').length;
}

// ===== NAVIGATION =====
function navigate(view) {
    document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
    document.getElementById(`view-${view}`).classList.remove('hidden');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('text-indigo-500'));
    const active = document.querySelector(`[data-nav="${view}"]`);
    if (active) active.classList.add('text-indigo-500');
    state.currentView = view;
    renderView(view);
}

function renderView(view) {
    const el = document.getElementById(`view-${view}`);
    switch(view) {
        case 'dashboard': renderDashboard(el); break;
        case 'learn': renderLearn(el); break;
        case 'flashcards': renderFlashcards(el); break;
        case 'practice': renderPractice(el); break;
        case 'games': renderGames(el); break;
        case 'library': renderLibrary(el); break;
        case 'stats': renderStats(el); break;
        case 'settings': renderSettings(el); break;
        case 'import': renderImport(el); break;
    }
}

// ===== DASHBOARD =====

            <div class="text-center py-4">

                    <svg width="120" height="120" class="progress-ring">
                        <circle cx="60" cy="60" r="52" fill="none" stroke="currentColor" stroke-width="8" class="text-slate-200 dark:text-slate-700"/>
                        <circle cx="60" cy="60" r="52" fill="none" stroke="url(#grad)" stroke-width="8" stroke-linecap="round" stroke-dasharray="${326}" stroke-dashoffset="${326 - (326 * pct / 100)}"/>
                        <defs><linearGradient id="grad"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#a855f7"/></linearGradient></defs>
                    </svg>
                    <div class="absolute inset-0 flex items-center justify-center flex-col">
                        <span class="text-2xl font-bold">${pct}%</span>
                        <span class="text-xs text-slate-500">today</span>
                    </div>
                </div>
                <p class="mt-2 text-lg font-medium">${msg}</p>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white dark:bg-slate-800 rounded-xl p-4 shadow-sm border border-slate-100 dark:border-slate-700">
                    <div class="text-2xl font-bold text-indigo-500">${state.streak}</div>
                    <div class="text-xs text-slate-500 mt-1">🔥 Day Streak</div>
                </div>
                <div class="bg-white dark:bg-slate-800 rounded-xl p-4 shadow-sm border border-slate-100 dark:border-slate-700">
                    <div class="text-2xl font-bold text-emerald-500">${state.todayLearned}</div>
                    <div class="text-xs text-slate-500 mt-1">📖 Learned Today</div>
                </div>
                <div class="bg-white dark:bg-slate-800 rounded-xl p-4 shadow-sm border border-slate-100 dark:border-slate-700">
                    <div class="text-2xl font-bold text-amber-500">${due}</div>
                    <div class="text-xs text-slate-500 mt-1">📝 Due for Review</div>
                </div>
                <div class="bg-white dark:bg-slate-800 rounded-xl p-4 shadow-sm border border-slate-100 dark:border-slate-700">
                    <div class="text-2xl font-bold text-purple-500">${mastered}</div>
                    <div class="text-xs text-slate-500 mt-1">⭐ Mastered</div>
                </div>
            </div>

            <div class="bg-white dark:bg-slate-800 rounded-xl p-4 shadow-sm border border-slate-100 dark:border-slate-700">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm font-medium">Progress</span>
                    <span class="text-xs text-slate-500">${learned}/${VOCAB.length} words</span>
                </div>
                <div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-2.5">
                    <div class="bg-gradient-to-r from-indigo-500 to-purple-500 h-2.5 rounded-full transition-all" style="width:${(learned/VOCAB.length)*100}%"></div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="navigate('learn')" class="bg-gradient-to-r from-indigo-500 to-purple-500 text-white rounded-xl p-4 font-semibold shadow-lg hover:shadow-xl transition-all active:scale-95">
                    <i data-lucide="book-open" class="w-6 h-6 mx-auto mb-1"></i>

function showPracticeQuestion(el, mode) {
    if (practiceIndex >= practiceWords.length) {
        el.innerHTML = `<div class="text-center py-12"><p class="text-4xl mb-4">🏆</p><p class="text-lg font-semibold">Score: ${practiceScore}/${practiceWords.length}</p><button onclick="renderPractice(document.getElementById('view-practice'))" class="mt-4 px-6 py-3 bg-indigo-500 text-white rounded-xl font-medium">Try Again</button></div>`;

    if (mode === 'mc') showMC(el, w);
    else if (mode === 'type') showType(el, w);
    else if (mode === 'fill') showFill(el, w);
    else if (mode === 'listen') showListen(el, w);
}

function showMC(el, w) {
    const options = shuffleArray([w.vi, ...shuffleArray(VOCAB.filter(v => v.word !== w.word).map(v => v.vi)).slice(0, 3)]);
    el.innerHTML = `
        <div class="mb-3 text-sm text-slate-500">${practiceIndex+1}/10 · Score: ${practiceScore}</div>

        </div>
        <div class="space-y-2">
            ${options.map(o => `<button onclick="checkMC(this, '${escapeHtml(o)}', '${escapeHtml(w.vi)}')" class="w-full text-left p-4 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-600 hover:border-indigo-400 transition active:scale-[0.98] font-medium">${o}</button>`).join('')}
        </div>
    `;
}

function checkMC(btn, selected, correct) {
    const buttons = btn.parentElement.querySelectorAll('button');
    buttons.forEach(b => {
        b.disabled = true;
        b.classList.remove('hover:border-indigo-400');
        if (b.textContent === correct) b.classList.add('bg-emerald-100', 'dark:bg-emerald-900/30', 'border-emerald-400');
    });
    if (selected === correct) {
        btn.classList.add('bg-emerald-100', 'dark:bg-emerald-900/30', 'border-emerald-400');
        practiceScore++;
    } else {
        btn.classList.add('bg-red-100', 'dark:bg-red-900/30', 'border-red-400');
    }
    recordStudy();
    setTimeout(() => { practiceIndex++; showPracticeQuestion(document.getElementById('view-practice'), 'mc'); }, 1200);
}

function showType(el, w) {

function checkListen(btn, selected, correct) {

let gameTimer = null;

function startGame(type) {
    const el = document.getElementById('view-games');
    if (type === 'scramble') startScramble(el);
    else if (type === 'speed') startSpeed(el);
    else if (type === 'match') startMatch(el);
}

function startScramble(el) {
    const words = shuffleArray([...VOCAB]).slice(0, 5);
    let idx = 0, score = 0;
    function showScrambleWord() {
        if (idx >= words.length) { el.innerHTML = `<div class="text-center py-12"><p class="text-4xl mb-4">🏆</p><p class="text-lg font-semibold">Score: ${score}/${words.length}</p><button onclick="renderGames(document.getElementById('view-games'))" class="mt-4 px-6 py-3 bg-indigo-500 text-white rounded-xl font-medium">Play Again</button></div>`; return; }
        const w = words[idx];
        const scrambled = shuffleArray(w.word.split('')).join('');
        el.innerHTML = `
            <div class="mb-3 text-sm text-slate-500">${idx+1}/5 · Score: ${score}</div>
            <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-lg border border-slate-100 dark:border-slate-700 text-center mb-4">
                <p class="text-3xl font-bold tracking-widest text-indigo-500">${scrambled.toUpperCase()}</p>
                <p class="text-sm text-slate-500 mt-2">Hint: ${w.vi}</p>
            </div>
            <form onsubmit="event.preventDefault(); checkScramble()" class="space-y-3">
                <input id="scramble-input" type="text" placeholder="Unscramble..." class="w-full p-4 rounded-xl border border-slate-200 dark:border-slate-600 dark:bg-slate-800 text-lg focus:outline-none focus:ring-2 focus:ring-indigo-400" autocomplete="off">
                <button type="submit" class="w-full py-3 bg-indigo-500 text-white rounded-xl font-semibold">Check</button>
            </form>
            <div id="scramble-fb"></div>
        `;
        setTimeout(() => document.getElementById('scramble-input')?.focus(), 100);
        window.checkScramble = () => {
            const val = document.getElementById('scramble-input').value.trim().toLowerCase();
            const fb = document.getElementById('scramble-fb');
            if (val === w.word.toLowerCase()) { score++; fb.innerHTML = `<p class="mt-3 text-emerald-500 font-semibold text-center">✓ Correct!</p>`; }
            else fb.innerHTML = `<p class="mt-3 text-red-500 font-semibold text-center">✗ It was: ${w.word}</p>`;
            idx++;
            setTimeout(showScrambleWord, 1200);
        };
    }
    showScrambleWord();
}

function startSpeed(el) {
    const words = shuffleArray([...VOCAB]).slice(0, 20);
    let idx = 0, score = 0, timeLeft = 60;
    if (gameTimer) clearInterval(gameTimer);

    function renderSpeedQ() {
        if (idx >= words.length || timeLeft <= 0) {
            clearInterval(gameTimer);
            el.innerHTML = `<div class="text-center py-12"><p class="text-4xl mb-4">⚡</p><p class="text-lg font-semibold">Score: ${score}</p><p class="text-slate-500">in ${60-timeLeft}s</p><button onclick="renderGames(document.getElementById('view-games'))" class="mt-4 px-6 py-3 bg-indigo-500 text-white rounded-xl font-medium">Play Again</button></div>`;
            return;
        }
        const w = words[idx];
        const options = shuffleArray([w.vi, ...shuffleArray(VOCAB.filter(v=>v.word!==w.word).map(v=>v.vi)).slice(0,3)]);
        el.innerHTML = `
            <div class="flex justify-between items-center mb-3">
                <span class="text-sm font-bold text-red-500" id="speed-timer">⏱ ${timeLeft}s</span>
                <span class="text-sm text-slate-500">Score: ${score}</span>
            </div>
            <div class="bg-white dark:bg-slate-800 rounded-xl p-4 shadow text-center mb-3 border border-slate-100 dark:border-slate-700">
                <h2 class="text-2xl font-bold">${w.word}</h2>
            </div>
            <div class="grid grid-cols-2 gap-2">
                ${options.map(o => `<button onclick="speedAnswer('${escapeHtml(o)}','${escapeHtml(w.vi)}')" class="p-3 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-600 text-sm font-medium active:scale-95 transition">${o}</button>`).join('')}
            </div>
        `;
    }

    window.speedAnswer = (sel, cor) => { if (sel === cor) score++; idx++; renderSpeedQ(); };
    gameTimer = setInterval(() => { timeLeft--; const t = document.getElementById('speed-timer'); if(t) t.textContent = `⏱ ${timeLeft}s`; if(timeLeft<=0) renderSpeedQ(); }, 1000);
    renderSpeedQ();
}

function startMatch(el) {
    const pairs = shuffleArray([...VOCAB]).slice(0, 6);
    const cards = shuffleArray([...pairs.map(p => ({id: p.word, text: p.word, type: 'word'})), ...pairs.map(p => ({id: p.word, text: p.vi, type: 'meaning'}))]);
    let flipped = [], matched = [], moves = 0;

    function renderMatchGrid() {
        el.innerHTML = `
            <div class="flex justify-between mb-3"><span class="text-sm text-slate-500">Moves: ${moves}</span><span class="text-sm text-slate-500">Pairs: ${matched.length}/${pairs.length}</span></div>
            <div class="grid grid-cols-3 gap-2">
                ${cards.map((c, i) => {
                    const isFlipped = flipped.includes(i) || matched.includes(c.id);
                    return `<button onclick="flipMatch(${i})" class="aspect-square rounded-xl border-2 flex items-center justify-center p-1 text-xs font-medium transition ${isFlipped ? 'bg-indigo-100 dark:bg-indigo-900/30 border-indigo-400' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-600'} ${matched.includes(c.id) ? 'opacity-50' : ''}" ${matched.includes(c.id) ? 'disabled' : ''}>${isFlipped ? c.text : '?'}</button>`;
                }).join('')}
            </div>
        `;
    }

    window.flipMatch = (i) => {
        if (flipped.includes(i) || matched.includes(cards[i].id) || flipped.length >= 2) return;
        flipped.push(i);
        renderMatchGrid();
        if (flipped.length === 2) {
            moves++;
            const [a, b] = flipped;
            if (cards[a].id === cards[b].id && cards[a].type !== cards[b].type) {
                matched.push(cards[a].id);
                flipped = [];
                if (matched.length === pairs.length) {
                    setTimeout(() => { el.innerHTML = `<div class="text-center py-12"><p class="text-4xl mb-4">🎉</p><p class="text-lg font-semibold">Completed in ${moves} moves!</p><button onclick="renderGames(document.getElementById('view-games'))" class="mt-4 px-6 py-3 bg-indigo-500 text-white rounded-xl font-medium">Play Again</button></div>`; }, 500);
                } else renderMatchGrid();
            } else {
                setTimeout(() => { flipped = []; renderMatchGrid(); }, 1000);
            }
        }
    };
    renderMatchGrid();
}

// ===== VOCABULARY IMPORT =====
let importPreview = [];
let importStats = { total: 0, valid: 0, duplicates: 0, invalid: 0 };

function parseImportInput(text) {
    const lines = text.trim().split('\n').filter(l => l.trim());
    const parsed = [];
    const existingWords = new Set(VOCAB.map(v => v.word.toLowerCase()));
    const duplicatesLocal = new Set();

    importStats = { total: 0, valid: 0, duplicates: 0, invalid: 0 };

    lines.forEach((line, idx) => {
        importStats.total++;
        const parts = line.split('|').map(p => p.trim());

        if (parts.length < 4 || !parts[0]) {
            importStats.invalid++;
            return;
        }

        const word = parts[0].toLowerCase();
        const ipa = parts[1] || '';
        const pos = parts[2] || 'noun';
        const vi = parts[3] || '';
        const example = parts[4] || '';
        const note = parts[5] || '';

        if (existingWords.has(word) || duplicatesLocal.has(word)) {
            importStats.duplicates++;
            return;
        }

        duplicatesLocal.add(word);
        importStats.valid++;

        parsed.push({
            word: word,
            ipa: ipa,
            pos: pos,
            vi: vi,
            def: note || `Related to ${word}`,
            example: example || `Example with ${word}.`,
            synonyms: [],
            antonyms: [],
            family: [],
            difficulty: 2,
            tags: ['imported'],
            isNew: true
        });
    });

    return parsed;
}

function copyTemplate() {
    navigator.clipboard.writeText(VOCAB_TEMPLATE).then(() => {
        const btn = event.target;
        const orig = btn.textContent;
        btn.textContent = '✓ Copied!';
        setTimeout(() => { btn.textContent = orig; }, 2000);
    }).catch(() => {
        alert('Failed to copy template');
    });
}

function previewImport() {
    const input = document.getElementById('import-input').value;
    if (!input.trim()) {
        alert('Please paste some vocabulary data');
        return;
    }

    importPreview = parseImportInput(input);

    document.getElementById('stat-total').textContent = importStats.total;
    document.getElementById('stat-valid').textContent = importStats.valid;
    document.getElementById('stat-dup').textContent = importStats.duplicates;
    document.getElementById('stat-invalid').textContent = importStats.invalid;

    const list = document.getElementById('preview-list');
    list.innerHTML = importPreview.map((w, i) => `
        <div class="border border-slate-200 dark:border-slate-600 rounded-lg p-3 space-y-1">
            <div class="flex justify-between items-start gap-2">
                <div>
                    <h4 class="font-bold text-indigo-600 dark:text-indigo-400">${w.word}</h4>
                    <p class="text-xs text-slate-500">${w.ipa} · ${w.pos}</p>
                </div>
                <button onclick="removeFromPreview(${i})" class="text-red-500 hover:text-red-700 text-sm">✕</button>
            </div>
            <p class="text-sm text-indigo-600 dark:text-indigo-400">${w.vi}</p>
            <p class="text-sm text-slate-600 dark:text-slate-400 italic">${w.example}</p>
        </div>
    `).join('');

    document.getElementById('import-preview').classList.remove('hidden');
}

function removeFromPreview(idx) {
    importPreview.splice(idx, 1);
    importStats.valid--;
    previewImport();
}

function confirmImport() {
    if (importPreview.length === 0) {
        alert('No valid words to import');
        return;
    }

    VOCAB.push(...importPreview);

    const msg = `✅ Imported ${importPreview.length} word${importPreview.length !== 1 ? 's' : ''}!`;
    const list = document.getElementById('preview-list');
    list.innerHTML = `<div class="text-center py-8"><p class="text-3xl mb-2">🎉</p><p class="text-lg font-semibold">${msg}</p></div>`;

    document.getElementById('import-btn').disabled = true;
    document.getElementById('import-btn').textContent = 'Done!';

    setTimeout(() => {
        document.getElementById('import-input').value = '';
        document.getElementById('import-preview').classList.add('hidden');
        document.getElementById('import-btn').disabled = false;
        document.getElementById('import-btn').textContent = 'Import Words';
        navigate('dashboard');
    }, 2000);
}
